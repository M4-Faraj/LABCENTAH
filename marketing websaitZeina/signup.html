.auth-box { width:290px; text-align:center; position:relative; z-index:2; }

.social-icons { display:flex; align-items:center; justify-content:center; gap:12px; margin:8px 0; }
.social-icons svg { width:20px; height:20px; fill:white; cursor:pointer; transition:transform 0.2s; }
.social-icons svg:hover { transform:scale(1.15); }
.auth-box p { font-size:11px; color:#bbb; margin-top:8px; }
.auth-box a { color:#d8b4fe; text-decoration:none; }
.auth-box a:hover { color:white; }
